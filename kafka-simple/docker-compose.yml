services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka-simple-broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      # Two PLAINTEXT listeners: 19092 for in-network clients (the app),
      # 9092 for the host (handy for ad-hoc kcat / kafka-console-consumer).
      KAFKA_LISTENERS: "PLAINTEXT://:19092,CONTROLLER://:9093,PLAINTEXT_HOST://:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:19092 --list >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s

  producer:
    build:
      context: ./producer
      dockerfile: Containerfile
    container_name: kafka-simple-producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:19092"
      KAFKA_TOPIC: "kafka-simple-demo-topic"
      PRODUCE_INTERVAL_SECONDS: "2"
      KAFKA_NUM_PARTITIONS: "1"
      KAFKA_REPLICATION_FACTOR: "1"
      # Local compose talks PLAINTEXT to the in-network broker. On a platform
      # that swaps in a managed Kafka service, this is overridden with SSL and
      # KAFKA_CA_CERT / KAFKA_ACCESS_CERT / KAFKA_ACCESS_KEY (inline PEM) are
      # injected for mTLS — no app change needed.
      KAFKA_SECURITY_PROTOCOL: "PLAINTEXT"
    restart: on-failure

  consumer:
    build:
      context: ./consumer
      dockerfile: Containerfile
    container_name: kafka-simple-consumer
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:19092"
      KAFKA_TOPIC: "kafka-simple-demo-topic"
      KAFKA_GROUP_ID: "demo-group"
      KAFKA_AUTO_OFFSET_RESET: "earliest"
      # See the producer service: PLAINTEXT locally, overridden to SSL (mTLS)
      # when the platform substitutes a managed Kafka service.
      KAFKA_SECURITY_PROTOCOL: "PLAINTEXT"
      HTTP_PORT: "8000"
    restart: on-failure
