services:
  valkey:
    image: valkey/valkey:8-alpine
    container_name: valkey-simple-server
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  app:
    build:
      context: ./app
      dockerfile: Containerfile
    container_name: valkey-simple-app
    depends_on:
      valkey:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      VALKEY_URL: "valkey://valkey:6379"
      CACHE_TTL_SECONDS: "10"
      TICK_INTERVAL_SECONDS: "1"
      SLOW_COMPUTE_SECONDS: "2"
      HTTP_PORT: "8000"
    restart: on-failure
