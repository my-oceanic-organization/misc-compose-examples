services:
  opensearch:
    image: opensearchproject/opensearch:2
    container_name: opensearch-simple-node
    ports:
      - "9200:9200"
    environment:
      cluster.name: "opensearch-simple"
      node.name: "opensearch-simple-node"
      discovery.type: "single-node"
      bootstrap.memory_lock: "true"
      # Keep the demo minimal: turn off the security plugin so we can talk
      # plain HTTP without certificates or admin credentials.
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=2s >/dev/null || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 20s

  app:
    build:
      context: ./app
      dockerfile: Containerfile
    container_name: opensearch-simple-app
    depends_on:
      opensearch:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      OPENSEARCH_URL: "http://opensearch:9200"
      OPENSEARCH_INDEX: "demo"
      SEARCH_INTERVAL_SECONDS: "3"
      HTTP_PORT: "8000"
    restart: on-failure
