services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse-simple-server
    ports:
      # 8123 = HTTP interface (curl, clickhouse-connect)
      # 9000 = native TCP protocol (clickhouse-client)
      - "8123:8123"
      - "9000:9000"
    environment:
      # Default single-node setup, no auth, no persistence — fine for a demo.
      CLICKHOUSE_DB: "default"
      CLICKHOUSE_USER: "default"
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    ulimits:
      # ClickHouse recommends a high nofile limit; without this the server
      # logs a warning on startup.
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: ./app
      dockerfile: Containerfile
    container_name: clickhouse-simple-app
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      CLICKHOUSE_HOST: "clickhouse"
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_USER: "default"
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DATABASE: "default"
      INSERT_INTERVAL_SECONDS: "1"
      INSERT_BATCH_SIZE: "50"
      REPORT_INTERVAL_SECONDS: "5"
    restart: on-failure
